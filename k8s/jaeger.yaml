apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: traceops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          args: ["--memory.max-traces=2000", "--collector.otlp.enabled=true", "--collector.zipkin.host-port=:9411"]
          ports:
            - name: ui
              containerPort: 16686
            - name: collector-http
              containerPort: 14268
            - name: otlp-grpc
              containerPort: 4317
            - name: zipkin
              containerPort: 9411
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: traceops
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: collector-http
      port: 14268
      targetPort: 14268
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: zipkin
      port: 9411
      targetPort: 9411
  type: ClusterIP
