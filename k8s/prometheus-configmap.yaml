apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: traceops
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector.traceops.svc.cluster.local:8889']
