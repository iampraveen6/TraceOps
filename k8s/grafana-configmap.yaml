apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: traceops
  labels:
    app: grafana
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.traceops.svc.cluster.local:9090
        isDefault: true
